---
# localhost — local provisioning (ansible_connection: local).
# Inherits workstations group defaults; override profile/features here.

ansible_python_interpreter: "{{ ansible_playbook_python }}"

profile: "{{ 'headless' if ansible_facts['os_family'] == 'Darwin' else 'desktop-xfce' }}"

features:
  editor:
    neovim: true
    lazyvim: false
    vscode: false
  fpga:
    vivado: false
    quartus: false
    oss: false
  xrdp: false
