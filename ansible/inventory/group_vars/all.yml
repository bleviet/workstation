---
# ── Ansible ───────────────────────────────────────────────────────────────────
# Use Python 3 on all managed hosts; suppress interpreter discovery warnings.
ansible_python_interpreter: /usr/bin/python3


# "common" names are identical across apt and dnf.

packages:
  common:
    - curl
    - file
    - fontconfig
    - git
    - procps
    - stow
    - tmux
    - unzip
    - wget
    - zsh
  apt:
    - acl        # required for Ansible become_user with unprivileged accounts
    - p7zip-full
    - xclip
  dnf:
    - p7zip
    - xclip
  homebrew:
    - p7zip

# ── Git ───────────────────────────────────────────────────────────────────────
# Git identity and settings are managed as a dotfile via chezmoi.
# Edit dotfiles/dot_gitconfig (owner mode) or your personal dotfiles repo.

# ── Developer user ────────────────────────────────────────────────────────────
# Account that owns the dotfiles, dev tools, and shell config.
# Defaults to the Ansible SSH user so existing setups need no changes.
# Set per host in host_vars/<hostname>.yml to provision a different account:
#   dev_user: bach
dev_user: "{{ ansible_facts['user_id'] }}"
dev_user_home: "{{ '/Users/' + dev_user if ansible_facts['os_family'] == 'Darwin' else '/home/' + dev_user }}"
# SSH public key to install for dev_user. Leave empty to skip (password login
# or manual key setup). Set per host in host_vars/<hostname>.yml, e.g.:
#   dev_user_ssh_pubkey: "ssh-ed25519 AAAA... bach@laptop"
dev_user_ssh_pubkey: ""

# ── Environment profile ───────────────────────────────────────────────────────
# Controls which desktop environment roles are applied.
# Values: headless | desktop-gnome | desktop-xfce | desktop-i3wm
# Override per host in host_vars/<hostname>.yml
profile: headless

# ── Feature flags ─────────────────────────────────────────────────────────────
# Override per host in host_vars/ if needed.
#
# editor:
#   neovim  — install the neovim binary; dotfiles supply the config via chezmoi
#   lazyvim — pre-install LazyVim plugins during provisioning (implies neovim)
#             so the first launch is instant rather than downloading on first open
#   vscode  — install VS Code via the Microsoft apt/dnf repository
#
# fpga:
#   vivado  — AMD/Xilinx runtime libs + Xilinx/Digilent udev rules
#   quartus — Intel/Altera runtime libs + USB-Blaster udev rules
#   oss     — open-source EDA toolchain (iverilog, gtkwave, verilator, ghdl, nvc)
#   USB/JTAG libraries and hardware-access groups are added whenever any fpga
#   sub-flag is true; they are shared across all commercial and OSS tools.
#
# xrdp — install xrdp for Windows Remote Desktop access (port 3389)

features:
  editor:
    neovim: true    # most machines want neovim; set false to skip entirely
    lazyvim: false  # pre-install LazyVim plugins (slow first launch otherwise)
    vscode: false
  fpga:
    vivado: false
    quartus: false
    oss: false
  xrdp: false
