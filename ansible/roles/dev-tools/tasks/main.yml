---
- name: Ensure dev_tools_bin_dir exists
  ansible.builtin.file:
    path: "{{ dev_tools_bin_dir }}"
    state: directory
    mode: "0755"
  become: "{{ dev_user != ansible_facts['user_id'] }}"
  become_user: "{{ dev_user }}"

- name: Install macOS specific tools via Homebrew
  ansible.builtin.include_tasks:
    file: macos.yml
    apply:
      become: "{{ dev_user != ansible_facts['user_id'] }}"
      become_user: "{{ dev_user }}"
  when: ansible_facts['os_family'] == "Darwin"

- name: Install GitHub release binaries
  ansible.builtin.include_tasks:
    file: github_binaries.yml
    apply:
      become: "{{ dev_user != ansible_facts['user_id'] }}"
      become_user: "{{ dev_user }}"
  loop: "{{ github_binaries }}"
  loop_control:
    loop_var: tool
    label: "{{ tool.name }} {{ tool.version }}"
  when: ansible_facts['os_family'] != "Darwin"

- name: Install rustup
  ansible.builtin.include_tasks:
    file: rustup.yml
    apply:
      become: "{{ dev_user != ansible_facts['user_id'] }}"
      become_user: "{{ dev_user }}"

- name: Install nvm and Node.js
  ansible.builtin.include_tasks:
    file: nvm.yml
    apply:
      become: "{{ dev_user != ansible_facts['user_id'] }}"
      become_user: "{{ dev_user }}"

- name: Install uv and pyright
  ansible.builtin.include_tasks:
    file: uv.yml
    apply:
      become: "{{ dev_user != ansible_facts['user_id'] }}"
      become_user: "{{ dev_user }}"

- name: Install neovim
  ansible.builtin.include_tasks: neovim.yml
  when:
    - ansible_facts['os_family'] != "Darwin"
    - features.editor.neovim | default(true) | bool or features.editor.lazyvim | default(false) | bool

- name: Install VS Code
  ansible.builtin.include_tasks: vscode.yml
  when: features.editor.vscode | default(false) | bool

- name: Ensure ~/.config/shell exists
  ansible.builtin.file:
    path: "{{ dev_user_home }}/.config/shell"
    state: directory
    mode: "0755"
  become: "{{ dev_user != ansible_facts['user_id'] }}"
  become_user: "{{ dev_user }}"

- name: Install shell init for nvm and cargo
  ansible.builtin.copy:
    content: |
      # nvm (Node Version Manager)
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

      # Rust / Cargo
      [ -f "$HOME/.cargo/env" ] && . "$HOME/.cargo/env"
    dest: "{{ dev_user_home }}/.config/shell/dev-tools.sh"
    mode: "0644"
  become: "{{ dev_user != ansible_facts['user_id'] }}"
  become_user: "{{ dev_user }}"
