---
# VS Code is installed system-wide via the Microsoft package repository so that
# the OS package manager keeps it current on subsequent upgrades.

- name: Install VS Code (Debian/Ubuntu)
  when: ansible_facts['os_family'] == 'Debian'
  become: true
  block:
    - name: Install python3-debian (required by deb822_repository module)
      ansible.builtin.apt:
        name: python3-debian
        state: present

    - name: Add VS Code apt repository
      ansible.builtin.deb822_repository:
        name: vscode
        types: deb
        uris: https://packages.microsoft.com/repos/code
        suites: stable
        components: main
        architectures: amd64
        signed_by: https://packages.microsoft.com/keys/microsoft.asc
        state: present

    - name: Install code
      ansible.builtin.apt:
        name: code
        state: present
        update_cache: true

- name: Install VS Code (AlmaLinux/RHEL)
  when: ansible_facts['os_family'] == 'RedHat'
  become: true
  block:
    - name: Import Microsoft GPG key
      ansible.builtin.rpm_key:
        key: https://packages.microsoft.com/keys/microsoft.asc
        state: present

    - name: Add VS Code dnf repository
      ansible.builtin.yum_repository:
        name: code
        description: Visual Studio Code
        baseurl: https://packages.microsoft.com/yumrepos/vscode
        enabled: true
        gpgcheck: true
        gpgkey: https://packages.microsoft.com/keys/microsoft.asc

    - name: Install code
      ansible.builtin.dnf:
        name: code
        state: present

- name: Install VS Code (macOS Cask)
  community.general.homebrew_cask:
    name: visual-studio-code
    state: present
  when: ansible_facts['os_family'] == 'Darwin'

- name: Symlink VS Code command-line tool (macOS)
  ansible.builtin.file:
    src: "/Applications/Visual Studio Code.app/Contents/Resources/app/bin/code"
    dest: "{{ dev_tools_bin_dir }}/code"
    state: link
    force: yes
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install VS Code extensions
  ansible.builtin.command:
    cmd: "{{ (dev_tools_bin_dir + '/code') if ansible_facts['os_family'] == 'Darwin' else 'code' }} --install-extension {{ item }}"
  loop: "{{ vscode_extensions }}"
  become: "{{ dev_user != ansible_facts['user_id'] }}"
  become_user: "{{ dev_user }}"
  register: vscode_ext_install
  changed_when: "'was successfully installed' in vscode_ext_install.stdout"
