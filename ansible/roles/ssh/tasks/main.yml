---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] }}.yml"

- name: Install openssh-server and xauth
  ansible.builtin.package:
    name: "{{ ssh_packages }}"
    state: present
  become: true

- name: Deploy sshd hardening + X11 forwarding config
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-workstation.conf
    content: |
      X11Forwarding yes
      X11DisplayOffset 10
      X11UseLocalhost yes
      AllowAgentForwarding yes
    mode: "0644"
    owner: root
    group: root
  become: true
  notify: Restart sshd

- name: Enable and start sshd
  ansible.builtin.service:
    name: "{{ ssh_service_name }}"
    state: started
    enabled: true
  become: true
  when: ansible_facts['virtualization_type'] | default('') not in ['docker', 'containerd', 'podman']
  failed_when: false
