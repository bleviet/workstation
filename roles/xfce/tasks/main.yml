---
- name: Install XFCE desktop environment (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ xfce_packages_apt }}"
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Install XFCE desktop environment (RedHat/AlmaLinux)
  ansible.builtin.dnf:
    name: "{{ xfce_packages_dnf }}"
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Enable and start LightDM
  ansible.builtin.service:
    name: lightdm
    enabled: true
    state: started
  become: true
