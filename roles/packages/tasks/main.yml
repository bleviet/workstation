---
- name: Enable EPEL repository (RedHat family)
  ansible.builtin.dnf:
    name: epel-release
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Enable CRB repository (required for EPEL dependencies on RedHat family)
  ansible.builtin.command:
    cmd: dnf config-manager --set-enabled crb
  become: true
  when: ansible_os_family == "RedHat"
  changed_when: false

- name: Install system packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ packages.common + packages.apt }}"
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Install system packages (RedHat/AlmaLinux)
  ansible.builtin.dnf:
    name: "{{ packages.common + packages.dnf }}"
    state: present
  become: true
  when: ansible_os_family == "RedHat"
