---
- name: Install Sway and supporting tools (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ sway_packages_apt }}"
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Install Sway and supporting tools (RedHat/AlmaLinux)
  ansible.builtin.dnf:
    name: "{{ sway_packages_dnf }}"
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Enable and start SDDM
  ansible.builtin.service:
    name: sddm
    enabled: true
    state: started
  become: true
