---
- name: Check if uv is installed
  ansible.builtin.stat:
    path: "{{ dev_tools_bin_dir }}/uv"
  register: uv_stat

- name: Install uv
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  environment:
    UV_INSTALL_DIR: "{{ dev_tools_bin_dir }}"
  when: not uv_stat.stat.exists
  changed_when: true

- name: Check if pyright is installed
  ansible.builtin.stat:
    path: "{{ dev_tools_bin_dir }}/pyright"
  register: pyright_stat

- name: Install pyright via uv
  ansible.builtin.shell: |
    "{{ dev_tools_bin_dir }}/uv" tool install pyright
  environment:
    HOME: "{{ ansible_env.HOME }}"
    UV_TOOL_BIN_DIR: "{{ dev_tools_bin_dir }}"
  when: not pyright_stat.stat.exists
  changed_when: true
