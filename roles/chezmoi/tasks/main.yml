---
- name: Resolve workstation root from playbook location
  ansible.builtin.set_fact:
    workstation_root: "{{ playbook_dir | dirname }}"
  when: chezmoi_init_repo == ""

# Install chezmoi if not already present. This makes the chezmoi role
# self-contained so that chezmoi apply works without running dev-tools first.
- name: Check if chezmoi is installed
  ansible.builtin.stat:
    path: "{{ chezmoi_bin }}"
  register: chezmoi_stat

- name: Install chezmoi via official installer
  ansible.builtin.shell: |
    sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$(dirname '{{ chezmoi_bin }}')"
  environment:
    HOME: "{{ dev_user_home }}"
  when: not chezmoi_stat.stat.exists
  changed_when: true
  become: "{{ dev_user != ansible_user_id }}"
  become_user: "{{ dev_user }}"

- name: Ensure chezmoi config directory exists
  ansible.builtin.file:
    path: "{{ dev_user_home }}/.config/chezmoi"
    state: directory
    mode: "0700"
  become: "{{ dev_user != ansible_user_id }}"
  become_user: "{{ dev_user }}"

# ── Local mode (chezmoi_init_repo not set) ─────────────────────────────────
# The dotfiles/ folder inside this workstation repo is the chezmoi source.
# Suited for the repo owner managing their own machines.

# Determine source path first so both the config template and the copy task
# use the same value.
# - Remote hosts: use ~/.local/share/chezmoi (the standard chezmoi source
#   directory) so that `chezmoi diff`, `chezmoi cd`, and `chezmoi update` all
#   work after provisioning without needing the Ansible controller's filesystem.
# - Local execution: point directly at dotfiles/ inside this repo.
- name: Set chezmoi source path
  ansible.builtin.set_fact:
    chezmoi_source_path: >-
      {{
        dev_user_home + '/.local/share/chezmoi'
        if (inventory_hostname != 'localhost' and ansible_connection | default('ssh') != 'local')
        else workstation_root + '/dotfiles'
      }}
  when: chezmoi_init_repo == ""

- name: Configure chezmoi source directory (local source)
  ansible.builtin.template:
    src: chezmoi.toml.j2
    dest: "{{ dev_user_home }}/.config/chezmoi/chezmoi.toml"
    mode: "0600"
  when: chezmoi_init_repo == ""
  become: "{{ dev_user != ansible_user_id }}"
  become_user: "{{ dev_user }}"

# Copy dotfiles to the standard chezmoi source directory on the remote via
# SFTP (copy module) so that shell stdout pollution during SSH startup does
# not cause a protocol error. Files are kept at ~/.local/share/chezmoi so
# chezmoi commands work on the remote after provisioning.
- name: Copy dotfiles to remote for local-source mode
  ansible.builtin.copy:
    src: "{{ workstation_root }}/dotfiles/"
    dest: "{{ chezmoi_source_path }}/"
    mode: preserve
  when:
    - chezmoi_init_repo == ""
    - inventory_hostname != "localhost"
    - ansible_connection | default("ssh") != "local"
  become: "{{ dev_user != ansible_user_id }}"
  become_user: "{{ dev_user }}"

- name: Apply dotfiles with chezmoi (local source)
  ansible.builtin.command:
    argv:
      - "{{ chezmoi_bin }}"
      - apply
      - --no-tty
      - --force
      - --source
      - "{{ chezmoi_source_path }}"
  environment:
    HOME: "{{ dev_user_home }}"
  changed_when: true
  when: chezmoi_init_repo == ""
  become: "{{ dev_user != ansible_user_id }}"
  become_user: "{{ dev_user }}"

# ── External repo mode (chezmoi_init_repo set) ─────────────────────────────
# Each user points to their own dotfiles repo. chezmoi clones it to
# ~/.local/share/chezmoi on first run and applies it. On subsequent runs
# chezmoi skips the clone and re-applies from the existing source.
# Users commit dotfiles changes via: chezmoi cd && git commit && git push
#
# SSH auth strategy (SSH URLs only):
#   chezmoi_ssh_key_file set  → passphrase-less deployment key injected via
#                               GIT_SSH_COMMAND (unattended / CI)
#   chezmoi_ssh_key_file unset → ssh-agent forwarded via SSH_AUTH_SOCK
#                               (interactive; run ssh-add first)

- name: Assert SSH agent is available for SSH dotfiles URL
  ansible.builtin.fail:
    msg: >-
      chezmoi_init_repo uses an SSH URL but no SSH agent socket was found
      (SSH_AUTH_SOCK is unset). Load your key first:
        ssh-add ~/.ssh/<key>
      For remote hosts also add to ~/.ssh/config:
        Host <hostname>
          ForwardAgent yes
      For unattended runs, set chezmoi_ssh_key_file to a passphrase-less key.
  when:
    - chezmoi_init_repo != ""
    - chezmoi_init_repo is match("(git@|ssh://)")
    - chezmoi_ssh_key_file == ""
    - ansible_facts['env']['SSH_AUTH_SOCK'] is not defined

# Unattended / CI: inject a passphrase-less deployment key via GIT_SSH_COMMAND.
# BatchMode=yes makes ssh fail immediately instead of prompting for a passphrase.
# StrictHostKeyChecking=accept-new trusts the host on first clone only.
- name: Initialize and apply dotfiles from personal repo (deployment key)
  ansible.builtin.command:
    argv:
      - "{{ chezmoi_bin }}"
      - init
      - --apply
      - --force
      - "{{ chezmoi_init_repo }}"
  environment:
    HOME: "{{ dev_user_home }}"
    GIT_SSH_COMMAND: >-
      ssh -i {{ chezmoi_ssh_key_file }}
      -o StrictHostKeyChecking=accept-new
      -o BatchMode=yes
  changed_when: true
  when:
    - chezmoi_init_repo != ""
    - chezmoi_ssh_key_file != ""
  become: "{{ dev_user != ansible_user_id }}"
  become_user: "{{ dev_user }}"

# Interactive: forward the running ssh-agent socket so the agent handles auth.
- name: Initialize and apply dotfiles from personal repo (SSH agent)
  ansible.builtin.command:
    argv:
      - "{{ chezmoi_bin }}"
      - init
      - --apply
      - --force
      - "{{ chezmoi_init_repo }}"
  environment:
    HOME: "{{ dev_user_home }}"
    SSH_AUTH_SOCK: "{{ ansible_facts['env']['SSH_AUTH_SOCK'] | default('') }}"
  changed_when: true
  when:
    - chezmoi_init_repo != ""
    - chezmoi_ssh_key_file == ""
  become: "{{ dev_user != ansible_user_id }}"
  become_user: "{{ dev_user }}"
