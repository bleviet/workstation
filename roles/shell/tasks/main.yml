---
- name: Ensure ~/.config/shell directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/shell"
    state: directory
    mode: "0755"

- name: Place OS-specific shell snippet
  ansible.builtin.template:
    src: os.sh.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/shell/os.sh"
    mode: "0644"

- name: Check if oh-my-zsh is installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh"
  register: omz_stat

- name: Install oh-my-zsh
  ansible.builtin.shell:
    cmd: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
    executable: /bin/bash
  when: not omz_stat.stat.exists
  changed_when: true
