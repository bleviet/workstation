---
- name: Install Xorg and display server base (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ desktop_base_packages_apt }}"
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Install Xorg and display server base (RedHat/AlmaLinux)
  ansible.builtin.dnf:
    name: "{{ desktop_base_packages_dnf }}"
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Enable display manager
  ansible.builtin.service:
    name: "{{ desktop_display_manager }}"
    enabled: true
    state: started
  become: true
  when: desktop_display_manager != ""
