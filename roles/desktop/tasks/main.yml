---
- name: Install Xorg and display server base (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ desktop_base_packages_apt }}"
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Install Xorg and display server base (RedHat/AlmaLinux < 10)
  ansible.builtin.dnf:
    name: "{{ desktop_base_packages_dnf }}"
    state: present
  become: true
  when: ansible_os_family == "RedHat" and ansible_distribution_major_version | int < 10

- name: Install Wayland display server base (RedHat/AlmaLinux 10+)
  ansible.builtin.dnf:
    name: "{{ desktop_base_packages_dnf_wayland }}"
    state: present
  become: true
  when: ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 10
