---
desktop_base_packages_apt:
  - xorg
  - xserver-xorg
  - dbus-x11
  - fonts-noto
  - fonts-noto-color-emoji

desktop_base_packages_dnf:
  - xorg-x11-server-Xorg
  - xorg-x11-xinit
  - dbus-x11
  - google-noto-fonts-common

# RHEL 10+ dropped the standalone Xorg server in favour of Wayland.
# Noto fonts are not bundled here — neither google-noto-fonts-common nor
# fonts-noto-common is reliably available on AlmaLinux 10. Nerd Fonts are
# handled separately by the fonts role.
desktop_base_packages_dnf_wayland:
  - xorg-x11-server-Xwayland
  - dbus-x11
