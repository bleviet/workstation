---
- name: Install GNOME desktop environment (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ gnome_packages_apt }}"
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install GNOME desktop environment (RedHat/AlmaLinux)
  ansible.builtin.dnf:
    name: "{{ gnome_packages_dnf }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"

- name: Enable and start GDM (Debian/Ubuntu)
  ansible.builtin.service:
    name: gdm3
    enabled: true
    state: started
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Enable and start GDM (RedHat/AlmaLinux)
  ansible.builtin.service:
    name: gdm
    enabled: true
    state: started
  become: true
  when: ansible_facts['os_family'] == "RedHat"
