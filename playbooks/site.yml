---
# Full workstation provisioning. Run order matters:
#   packages → dev-tools → shell → chezmoi → fonts → fpga
#   ssh is always applied (X11 forwarding, sshd config)
#   desktop roles are applied based on the host's `profile` variable:
#     headless      — SSH only, no GUI
#     desktop-gnome — GNOME + GDM
#     desktop-xfce  — XFCE + LightDM
#     desktop-i3wm  — i3wm + LightDM
#   xrdp is opt-in via features.xrdp: true
#
# Usage:
#   ansible-playbook playbooks/site.yml -K
- name: Provision workstation
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Require ansible-core >= 2.17
      ansible.builtin.assert:
        that:
          - ansible_version.major > 2 or
            (ansible_version.major == 2 and ansible_version.minor >= 17)
        fail_msg: |
          ansible-core >= 2.17 is required (found {{ ansible_version.full }}).

          Fix:
            pip3 install --user "ansible-core>=2.17"
            export PATH="$HOME/.local/bin:$PATH"   # or open a new terminal
      delegate_to: localhost
      run_once: true

    - name: Gather facts
      ansible.builtin.gather_facts:
  roles:
    - packages
    - dev-tools
    - shell
    - chezmoi
    - fonts
    - fpga
    - ssh
    - role: desktop
      when: "'desktop' in profile"
    - role: gnome
      when: "profile == 'desktop-gnome'"
    - role: xfce
      when: "profile == 'desktop-xfce'"
    - role: i3wm
      when: "profile == 'desktop-i3wm'"
    - role: xrdp
      when: "features.xrdp | default(false)"
