---
# Full workstation provisioning. Run order matters:
#
# Base roles (always applied):
#   user → packages → dev-tools → shell → chezmoi → fonts → ssh
#
# Optional features (skipped unless the matching flag is set):
#   fpga   — features.fpga: true
#   xrdp   — features.xrdp: true
#
# Desktop roles (applied based on the host's `profile` variable):
#   headless      — SSH only, no GUI
#   desktop-gnome — GNOME + GDM
#   desktop-xfce  — XFCE + LightDM
#   desktop-i3wm  — i3wm + LightDM
#
# Usage:
#   ansible-playbook playbooks/site.yml -K
- name: Provision workstation
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Require ansible-core >= 2.12
      ansible.builtin.assert:
        that:
          - ansible_version.major > 2 or
            (ansible_version.major == 2 and ansible_version.minor >= 12)
        fail_msg: |
          ansible-core >= 2.12 is required (found {{ ansible_version.full }}).
          The system apt/dnf package is usually too old — install via pip:

            pip3 install --user "ansible-core>=2.17"
            export PATH="$HOME/.local/bin:$PATH"   # or open a new terminal
      delegate_to: localhost
      run_once: true

    - name: Gather facts
      ansible.builtin.gather_facts:
  roles:
    # ── Base ───────────────────────────────────────────────────────────────
    - user
    - packages
    - dev-tools
    - shell
    - chezmoi
    - fonts
    - ssh
    # ── Optional features ─────────────────────────────────────────────────
    - role: fpga
      when: "features.fpga | default(false)"
    - role: desktop
      when: "'desktop' in profile"
    - role: gnome
      when: "profile == 'desktop-gnome'"
    - role: xfce
      when: "profile == 'desktop-xfce'"
    - role: i3wm
      when: "profile == 'desktop-i3wm'"
    - role: xrdp
      when: "features.xrdp | default(false)"
