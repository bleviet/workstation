---
# Full workstation provisioning. Run order matters:
#   packages → homebrew → git → shell → chezmoi → fonts → fpga
#   ssh is always applied (X11 forwarding, sshd config)
#   desktop roles are applied based on the host's `profile` variable:
#     headless      — SSH only, no GUI
#     desktop-gnome — GNOME + GDM
#     desktop-xfce  — XFCE + LightDM
#     desktop-i3wm  — i3wm + LightDM
#   xrdp is opt-in via features.xrdp: true
#
# Usage:
#   ansible-playbook playbooks/site.yml -K
- name: Provision workstation
  hosts: all
  gather_facts: true
  roles:
    - packages
    - homebrew
    - git
    - shell
    - chezmoi
    - fonts
    - fpga
    - ssh
    - role: desktop
      when: "'desktop' in profile"
    - role: gnome
      when: "profile == 'desktop-gnome'"
    - role: xfce
      when: "profile == 'desktop-xfce'"
    - role: i3wm
      when: "profile == 'desktop-i3wm' and not (ansible_os_family == 'RedHat' and ansible_distribution_major_version | int >= 10)"
    # RHEL 10+ has no Sway or XFCE packages in base repos or EPEL 10 yet.
    # GNOME is the only desktop available from standard repos on AlmaLinux 10.
    # Revisit when EPEL 10 matures (sway, xfce4-session, etc. become available).
    - role: sway
      when: false
    - role: gnome
      when: "profile == 'desktop-i3wm' and ansible_os_family == 'RedHat' and ansible_distribution_major_version | int >= 10"
    - role: xrdp
      when: "features.xrdp | default(false)"
