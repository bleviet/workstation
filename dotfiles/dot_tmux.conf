# Set the default terminal to xterm-256color
set -g default-terminal "xterm-256color"

# Set the prefix key to Ctrl-a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# set windows and pane index start to 1
set -g base-index 1
setw -g pane-base-index 1

# ------------------------------
# WINDOW AND PANE MANAGEMENT
# ------------------------------
# Split window horizontally with |
unbind %
bind | split-window -h

# Split window vertically with -
unbind '"'
bind - split-window -v

# Reload the tmux configuration file with r
unbind r
bind r source-file ~/.tmux.conf

# Resize panes with hjkl keys
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Faster window switching with Alt+number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Zoom in/out of a pane with m
bind -r m resize-pane -Z

# Enable mouse support
set -g mouse on

# Use vi mode keys in copy mode
set-window-option -g mode-keys vi

# ------------------------------
# CLIPBOARD & OSC 52 SETUP
# ------------------------------
# Enhanced copy mode key bindings
bind-key -T copy-mode-vi 'v' send -X begin-selection
# Copy text and show visual indication (fixed duplicate binding)
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || pbcopy 2>/dev/null || xclip -selection clipboard -i 2>/dev/null || powershell.exe -c 'Get-Clipboard | Set-Clipboard' 2>/dev/null || cat > /dev/null" \; display-message "Copied to clipboard"
bind-key -T copy-mode-vi 'Y' send -X copy-pipe-and-cancel "wl-copy -p 2>/dev/null || xclip -selection primary -i 2>/dev/null"

# Paste from system clipboard
bind-key C-v run "tmux set-buffer \"$(wl-paste 2>/dev/null || pbpaste 2>/dev/null || xclip -selection clipboard -o 2>/dev/null || powershell.exe -c Get-Clipboard 2>/dev/null)\"; tmux paste-buffer"

# Keep existing copy mode exit behavior
unbind -T copy-mode-vi MouseDragEnd1Pane

# Remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# ------------------------------
# PLUGIN MANAGER CONFIGURATION
# ------------------------------
# Install and configure tmux plugin manager (tpm)
set -g @plugin 'tmux-plugins/tpm'

# List of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # navigate seamlessly between vim and tmux splits
set -g @plugin 'tmux-plugins/tmux-resurrect' # save tmux environment across system restarts
set -g @plugin 'tmux-plugins/tmux-continuum' # automatic restoring and continuous saving of tmux env

# ------------------------------
# Use the dracula theme
# ------------------------------
set -g @plugin 'dracula/tmux'
set -g status-position top

# ------------------------------
# Store the session data
# ------------------------------
# Automatically save every 15 minutes
set -g @continuum-save-interval '15'

# Enable session restoration for tmux-continuum
set -g @continuum-restore 'on'

# Enable capturing pane contents for tmux-resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-ssh 'pane_contents'

# Enable OSC 52 clipboard support
set -s set-clipboard on
set -as terminal-features ',xterm-256color:clipboard'
set -as terminal-features ',tmux-256color:clipboard'

# ------------------------------
# FINAL - Initialize tmux plugin manager
# ------------------------------
run '~/.tmux/plugins/tpm/tpm'
