# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Use the Dracula palette
palette = 'dracula'

[palettes.dracula]
foreground = '#f8f8f2'
background = '#282a36'
current_line = '#44475a'
comment = '#6272a4'
cyan = '#8be9fd'
green = '#50fa7b'
orange = '#ffb86c'
pink = '#ff79c6'
purple = '#bd93f9'
red = '#ff5555'
yellow = '#f1fa8c'

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
vicmd_symbol = "[❮](purple)"

[directory]
style = "cyan"

[git_branch]
style = "purple"

[git_status]
style = "yellow"

[cmd_duration]
style = "orange"

[package]
style = "pink"
