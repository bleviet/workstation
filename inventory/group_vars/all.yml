---
# ── System packages ───────────────────────────────────────────────────────────
# "common" names are identical across apt and dnf.

packages:
  common:
    - bat
    - curl
    - file
    - fontconfig
    - git
    - procps
    - stow
    - unzip
    - wget
    - zsh
  apt:
    - p7zip-full
    - xclip
  dnf:
    - p7zip
    - xclip

# ── Homebrew formulae ─────────────────────────────────────────────────────────
# chezmoi is installed separately by the chezmoi role.

brew_formulae:
  - eza
  - fd
  - fzf
  - lazygit
  - neovim
  - node
  - pyright
  - ripgrep
  - rust
  - starship
  - tmux
  - uv
  - yazi
  - zoxide

# ── Git ───────────────────────────────────────────────────────────────────────

git_name: "Bach Le Viet"
git_email: "vietbach.le@bahonavi.de"
git_editor: nvim
git_default_branch: main

# ── Environment profile ───────────────────────────────────────────────────────
# Controls which desktop environment roles are applied.
# Values: headless | desktop-gnome | desktop-xfce | desktop-i3wm
# Override per host in host_vars/<hostname>.yml
profile: headless

# ── Feature flags ─────────────────────────────────────────────────────────────
# Override per host in host_vars/ if needed.

features:
  fpga: false
  xrdp: false
