---
# ── Vivado (AMD/Xilinx) ───────────────────────────────────────────────────────

- name: Prepare Vivado runtime environment (Debian/Ubuntu)
  when:
    - features.fpga.vivado | default(false) | bool
    - ansible_facts['os_family'] == "Debian"
  become: true
  block:
    - name: Check registered foreign architectures
      ansible.builtin.command: dpkg --print-foreign-architectures
      register: _dpkg_arches
      changed_when: false

    - name: Enable i386 (32-bit) architecture
      ansible.builtin.command: dpkg --add-architecture i386
      when: '"i386" not in _dpkg_arches.stdout'

    - name: Update apt cache after adding i386 architecture
      ansible.builtin.apt:
        update_cache: true

    - name: Install Vivado runtime libraries
      ansible.builtin.apt:
        name: "{{ fpga_vivado_libs_apt }}"
        state: present

    - name: Create libtinfo.so.5 → libtinfo.so.6 compat symlink
      ansible.builtin.file:
        src: /usr/lib/x86_64-linux-gnu/libtinfo.so.6
        dest: /usr/lib/x86_64-linux-gnu/libtinfo.so.5
        state: link

    - name: Create libncurses.so.5 → libncurses.so.6 compat symlink
      ansible.builtin.file:
        src: /usr/lib/x86_64-linux-gnu/libncurses.so.6
        dest: /usr/lib/x86_64-linux-gnu/libncurses.so.5
        state: link

    - name: Refresh ldconfig cache
      ansible.builtin.command: ldconfig
      changed_when: false

- name: Install Vivado runtime libraries (RedHat/AlmaLinux)
  ansible.builtin.dnf:
    name: "{{ fpga_vivado_libs_rpm }}"
    state: present
    update_cache: true
  become: true
  when:
    - features.fpga.vivado | default(false) | bool
    - ansible_facts['os_family'] == "RedHat"

- name: Deploy Xilinx/Digilent udev rules
  when: features.fpga.vivado | default(false) | bool
  become: true
  block:
    - name: Deploy Digilent USB-JTAG udev rules
      ansible.builtin.copy:
        src: udev/52-xilinx-digilent.rules
        dest: /etc/udev/rules.d/52-xilinx-digilent.rules
        owner: root
        group: root
        mode: "0644"
      notify: Reload udev rules

    - name: Deploy Xilinx Platform Cable / FTDI udev rules
      ansible.builtin.copy:
        src: udev/52-xilinx-ftdi.rules
        dest: /etc/udev/rules.d/52-xilinx-ftdi.rules
        owner: root
        group: root
        mode: "0644"
      notify: Reload udev rules

- name: Print Vivado manual installation note
  ansible.builtin.debug:
    msg: >
      Vivado must be installed manually.
      Download the Linux unified installer from AMD and run it as a regular user.
      Installer path inside the VM: /opt/fpga-installers/
      https://www.amd.com/en/support/downloads/xilinx-tools/vivado.html
  when: features.fpga.vivado | default(false) | bool

# ── Quartus Prime (Intel/Altera) ──────────────────────────────────────────────

- name: Install Quartus runtime libraries (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ fpga_quartus_libs_apt }}"
    state: present
  become: true
  when:
    - features.fpga.quartus | default(false) | bool
    - ansible_facts['os_family'] == "Debian"

- name: Install Quartus runtime libraries (RedHat/AlmaLinux)
  ansible.builtin.dnf:
    name: "{{ fpga_quartus_libs_rpm }}"
    state: present
  become: true
  when:
    - features.fpga.quartus | default(false) | bool
    - ansible_facts['os_family'] == "RedHat"

- name: Deploy Intel USB-Blaster udev rules
  ansible.builtin.copy:
    src: udev/51-usbblaster.rules
    dest: /etc/udev/rules.d/51-usbblaster.rules
    owner: root
    group: root
    mode: "0644"
  become: true
  when: features.fpga.quartus | default(false) | bool
  notify: Reload udev rules

- name: Print Quartus manual installation note
  ansible.builtin.debug:
    msg: >
      Quartus Prime must be installed manually (license agreement required).
      Download the Linux installer from Intel and run it as a regular user.
      Installer path inside the VM: /opt/fpga-installers/
      https://www.intel.com/content/www/us/en/software/programmable/quartus-prime/download.html
  when: features.fpga.quartus | default(false) | bool

# ── Shared USB/JTAG infrastructure ───────────────────────────────────────────
# Installed whenever any commercial tool flag is enabled; OSS tools that use
# hardware programmers (OpenOCD, openFPGALoader) also benefit.

- name: Install USB and JTAG libraries (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ fpga_usb_libs_apt }}"
    state: present
  become: true
  when:
    - features.fpga.vivado | default(false) | bool or features.fpga.quartus | default(false) | bool or features.fpga.oss | default(false) | bool
    - ansible_facts['os_family'] == "Debian"

- name: Install USB and JTAG libraries (RedHat/AlmaLinux)
  ansible.builtin.dnf:
    name: "{{ fpga_usb_libs_rpm }}"
    state: present
  become: true
  when:
    - features.fpga.vivado | default(false) | bool or features.fpga.quartus | default(false) | bool or features.fpga.oss | default(false) | bool
    - ansible_facts['os_family'] == "RedHat"

- name: Ensure plugdev group exists (RedHat — not created by default)
  ansible.builtin.group:
    name: plugdev
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == "RedHat"
    - features.fpga.vivado | default(false) | bool or features.fpga.quartus | default(false) | bool or features.fpga.oss | default(false) | bool

- name: Add {{ dev_user }} to hardware access groups
  ansible.builtin.user:
    name: "{{ dev_user }}"
    groups: "{{ item }}"
    append: true
  become: true
  loop: "{{ fpga_user_groups }}"
  when: features.fpga.vivado | default(false) | bool or features.fpga.quartus | default(false) | bool or features.fpga.oss | default(false) | bool

# ── Open-source EDA toolchain ─────────────────────────────────────────────────

- name: Install open-source simulation / waveform tools (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ fpga_oss_tools_apt }}"
    state: present
  become: true
  when:
    - features.fpga.oss | default(false) | bool
    - ansible_facts['os_family'] == "Debian"

- name: Install open-source simulation / waveform tools (RedHat/AlmaLinux)
  ansible.builtin.dnf:
    name: "{{ fpga_oss_tools_rpm }}"
    state: present
  become: true
  when:
    - features.fpga.oss | default(false) | bool
    - ansible_facts['os_family'] == "RedHat"

# ── FPGA environment variable stubs ──────────────────────────────────────────
# Only written when a commercial tool is requested; OSS tools need no stubs.

- name: Ensure /etc/environment.d exists
  ansible.builtin.file:
    path: /etc/environment.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: features.fpga.vivado | default(false) | bool or features.fpga.quartus | default(false) | bool

- name: Deploy FPGA environment stubs
  ansible.builtin.template:
    src: 60-fpga.conf.j2
    dest: /etc/environment.d/60-fpga.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  when: features.fpga.vivado | default(false) | bool or features.fpga.quartus | default(false) | bool
