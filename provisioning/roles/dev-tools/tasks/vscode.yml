---
# VS Code is installed system-wide via the Microsoft package repository so that
# the OS package manager keeps it current on subsequent upgrades.

- name: Install VS Code (Debian/Ubuntu)
  when: ansible_facts['os_family'] == 'Debian'
  become: true
  block:
    - name: Install python3-debian (required by deb822_repository module)
      ansible.builtin.apt:
        name: python3-debian
        state: present

    - name: Remove legacy VS Code apt source files (old apt_repository format)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/vscode.list
        - /etc/apt/keyrings/microsoft.asc

    - name: Add VS Code apt repository
      ansible.builtin.deb822_repository:
        name: vscode
        types: deb
        uris: https://packages.microsoft.com/repos/code
        suites: stable
        components: main
        architectures: amd64
        signed_by: https://packages.microsoft.com/keys/microsoft.asc
        state: present

    - name: Install code
      ansible.builtin.apt:
        name: code
        state: present
        update_cache: true

- name: Install VS Code (AlmaLinux/RHEL)
  when: ansible_facts['os_family'] == 'RedHat'
  become: true
  block:
    - name: Import Microsoft GPG key
      ansible.builtin.rpm_key:
        key: https://packages.microsoft.com/keys/microsoft.asc
        state: present

    - name: Add VS Code dnf repository
      ansible.builtin.yum_repository:
        name: code
        description: Visual Studio Code
        baseurl: https://packages.microsoft.com/yumrepos/vscode
        enabled: true
        gpgcheck: true
        gpgkey: https://packages.microsoft.com/keys/microsoft.asc

    - name: Install code
      ansible.builtin.dnf:
        name: code
        state: present
