---
- name: Install XFCE desktop environment (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ xfce_packages_apt }}"
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install XFCE desktop environment (RedHat/AlmaLinux)
  ansible.builtin.dnf:
    name: "{{ xfce_packages_dnf }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"

- name: Enable and start LightDM
  ansible.builtin.service:
    name: lightdm
    enabled: true
    state: started
  become: true
  failed_when: false

- name: Ensure /etc/lightdm/lightdm.conf.d exists
  ansible.builtin.file:
    path: /etc/lightdm/lightdm.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: xfce_autologin_user | default("") | length > 0

- name: Configure LightDM autologin for {{ xfce_autologin_user }}
  ansible.builtin.copy:
    content: |
      [Seat:*]
      autologin-user={{ xfce_autologin_user }}
      autologin-user-timeout=0
      user-session=xfce
    dest: /etc/lightdm/lightdm.conf.d/10-autologin.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  when: xfce_autologin_user | default("") | length > 0
