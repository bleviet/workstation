---
# Guest tool installation is skipped on bare-metal hosts.

# ── VMware ────────────────────────────────────────────────────────────────
- name: Install open-vm-tools for VMware guests (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    name:
      - open-vm-tools
      - open-vm-tools-desktop
    state: present
    update_cache: true
  when:
    - ansible_facts['virtualization_role'] == 'guest'
    - ansible_facts['virtualization_type'] == 'vmware'
    - ansible_facts['os_family'] == 'Debian'

- name: Install open-vm-tools for VMware guests (RedHat/AlmaLinux)
  become: true
  ansible.builtin.dnf:
    name:
      - open-vm-tools
      - open-vm-tools-desktop
    state: present
  when:
    - ansible_facts['virtualization_role'] == 'guest'
    - ansible_facts['virtualization_type'] == 'vmware'
    - ansible_facts['os_family'] == 'RedHat'

# ── VirtualBox ────────────────────────────────────────────────────────────
# On Debian, guest packages live in the contrib component.
# On Ubuntu, they are in universe (enabled by default in bento boxes).
# On AlmaLinux, bento boxes ship with Guest Additions pre-built; there is
# no clean distro package, so we only ensure the service is started.
- name: Enable Debian contrib component for VirtualBox guest packages
  become: true
  ansible.builtin.deb822_repository:
    name: debian-contrib
    types: deb
    uris: "http://deb.debian.org/debian"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: contrib
    state: present
  register: _contrib_repo
  when:
    - ansible_facts['virtualization_role'] == 'guest'
    - ansible_facts['virtualization_type'] == 'virtualbox'
    - ansible_facts['distribution'] == 'Debian'

- name: Update apt cache after enabling contrib
  become: true
  ansible.builtin.apt:
    update_cache: true
  when:
    - _contrib_repo is defined
    - _contrib_repo.changed | default(false)

- name: Install VirtualBox guest additions (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    name:
      - virtualbox-guest-utils
      - virtualbox-guest-x11
    state: present
    update_cache: true
  when:
    - ansible_facts['virtualization_role'] == 'guest'
    - ansible_facts['virtualization_type'] == 'virtualbox'
    - ansible_facts['os_family'] == 'Debian'
  ignore_errors: true

- name: Ensure VirtualBox guest service is running (RedHat/AlmaLinux)
  become: true
  ansible.builtin.service:
    name: vboxadd-service
    enabled: true
    state: started
  when:
    - ansible_facts['virtualization_role'] == 'guest'
    - ansible_facts['virtualization_type'] == 'virtualbox'
    - ansible_facts['os_family'] == 'RedHat'
  ignore_errors: true

# ── KVM / libvirt ─────────────────────────────────────────────────────────
# qemu-guest-agent: enables host↔guest communication (snapshot, freeze fs).
# spice-vdagent:    clipboard sync and auto-resize in SPICE display sessions.
- name: Install KVM guest agent and SPICE agent (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    name:
      - qemu-guest-agent
      - spice-vdagent
    state: present
    update_cache: true
  when:
    - ansible_facts['virtualization_role'] == 'guest'
    - ansible_facts['virtualization_type'] == 'kvm'
    - ansible_facts['os_family'] == 'Debian'

- name: Install KVM guest agent and SPICE agent (RedHat/AlmaLinux)
  become: true
  ansible.builtin.dnf:
    name:
      - qemu-guest-agent
      - spice-vdagent
    state: present
  when:
    - ansible_facts['virtualization_role'] == 'guest'
    - ansible_facts['virtualization_type'] == 'kvm'
    - ansible_facts['os_family'] == 'RedHat'
