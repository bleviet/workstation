---
# vm-fpga-dev-alma-9 — AlmaLinux 9 FPGA development VM (environments/vm-fpga-dev-alma-9/).
# Profile and features are inherited from group_vars/fpga_vms.yml.

# Ansible connects as 'vagrant' (ansible_user in hosts.yml) but provisions
# this account as the developer account inside the VM.
dev_user: bleviet
dev_user_ssh_pubkey: ""  # paste your SSH public key here

profile: desktop-xfce

features:
  editor:
    neovim: true
    lazyvim: false
    vscode: true
  fpga:
    vivado: false
    quartus: false
    oss: true
  xrdp: false
