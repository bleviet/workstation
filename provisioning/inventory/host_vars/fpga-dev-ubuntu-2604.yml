---
# fpga-dev-ubuntu-2604 — Ubuntu 26.04 FPGA development VM (environments/fpga-ubuntu-2604/).
# The base box already ships a minimal GNOME desktop, so this host overrides the
# fpga_vms group default (desktop-xfce) with desktop-gnome to avoid stacking a
# second desktop environment on top.
dev_user: bleviet
dev_user_ssh_pubkey: "" # paste your SSH public key here

profile: desktop-gnome

features:
  editor:
    neovim: true
    lazyvim: true
    vscode: true
  fpga:
    vivado: false
    quartus: false
    oss: true
  xrdp: false
