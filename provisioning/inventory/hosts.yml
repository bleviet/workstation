---
all:
  children:
    workstations:
      hosts:
        localhost:
          ansible_connection: local
      # Add remote workstations here, e.g.:
      # my_laptop:
      #   ansible_host: 192.168.1.10
      #   ansible_user: balevision
    servers:
      hosts:
      # Add remote servers here, e.g.:
        workstation-test-debian-i3wm:
          ansible_host: 192.168.246.139
          ansible_user: vagrant
        workstation-test-ubuntu-i3wm:
          ansible_host: 192.168.246.146
          ansible_user: vagrant
        workstation-test-almalinux-i3wm:
          ansible_host: 192.168.246.143
          ansible_user: vagrant
    # ── FPGA development VMs (Vagrant / VMware) ────────────────────────────
    # Run "vagrant up" in environments/fpga-alma/, environments/fpga-ubuntu/,
    # environments/fpga-debian/, then fill in the VM's IP address below (check "ip addr" in the VM console).
    # Provision from the admin machine:
    #   ansible-playbook provisioning/site.yml --limit fpga-dev-alma9
    fpga_vms:
      hosts:
        fpga-dev-alma9:
          ansible_host: "192.168.246.151"   # set after vagrant up
          ansible_user: vagrant
        fpga-dev-ubuntu2404:
          ansible_host: "192.168.246.152"   # set after vagrant up
          ansible_user: vagrant
        fpga-dev-debian13:
          ansible_host: "192.168.246.153"   # set after vagrant up
          ansible_user: vagrant
