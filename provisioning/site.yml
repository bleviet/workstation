---
# Full workstation provisioning. Run order matters:
#
# Base roles (always applied):
#   user → packages → dev-tools → shell → chezmoi → fonts → ssh
#
# Optional features (skipped unless the matching flag is set):
#   fpga   — features.fpga: true
#   xrdp   — features.xrdp: true
#
# Desktop roles (applied based on the host's `profile` variable):
#   headless      — SSH only, no GUI
#   desktop-gnome — GNOME + GDM
#   desktop-xfce  — XFCE + LightDM
#   desktop-i3wm  — i3wm + LightDM
#
# Usage:
#   ansible-playbook playbooks/site.yml -K
- name: Provision workstation
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Require ansible-core >= 2.15
      ansible.builtin.assert:
        that:
          - ansible_version.major > 2 or
            (ansible_version.major == 2 and ansible_version.minor >= 15)
        fail_msg: |
          ansible-core >= 2.15 is required (found {{ ansible_version.full }}).
          The system apt/dnf package is usually too old — install via pip:

            pip3 install --user "ansible-core>=2.17"
            export PATH="$HOME/.local/bin:$PATH"   # or open a new terminal
      delegate_to: localhost
      run_once: true

    - name: Gather facts
      ansible.builtin.gather_facts:
  roles:
    # ── Base ───────────────────────────────────────────────────────────────
    - user
    - packages
    - dev-tools
    - shell
    - chezmoi
    - fonts
    - ssh
    # ── Optional features ─────────────────────────────────────────────────
    - role: fpga
      when: >-
        features.fpga.vivado  | default(false) | bool or
        features.fpga.quartus | default(false) | bool or
        features.fpga.oss     | default(false) | bool
    - role: desktop
      when: "'desktop' in profile"
    - role: gnome
      when: "profile == 'desktop-gnome'"
    - role: xfce
      when: "profile == 'desktop-xfce'"
    - role: i3wm
      when: "profile == 'desktop-i3wm'"
    - role: xrdp
      when: "features.xrdp | default(false)"
  # ── Post-provisioning ──────────────────────────────────────────────────────
  # Runs after all roles. Neovim binary and dotfiles (including LazyVim config)
  # must both be in place before plugins can be synced.
  post_tasks:
    - name: Pre-install LazyVim plugins
      ansible.builtin.command:
        argv:
          - "{{ dev_tools_bin_dir }}/nvim"
          - "--headless"
          - "+Lazy! sync"
          - "+qa"
      environment:
        HOME: "{{ dev_user_home }}"
      become: "{{ dev_user != ansible_facts['user_id'] }}"
      become_user: "{{ dev_user }}"
      changed_when: true
      when: features.editor.lazyvim | default(false) | bool
