# FPGA Development VM — Vivado (Xilinx/AMD) + Quartus (Intel/Altera)
# Host: Windows 11, 64 GB RAM
# Guest: Debian 13 + XFCE4 desktop (installed by Ansible)
#
# Hardware note: all values are thin-provisioned where applicable.
# Ansible handles software: desktop env, FPGA tools, udev rules, dotfiles.

name: fpga-dev-debian13
os: debian13         # matches environments/os/debian13/os.yml
hostname: fpga-dev

ram_mb: 32768        # 32 GB — leaves 32 GB for the Windows host
cpus: 8              # logical CPUs visible inside the VM
vram_mb: 256         # video RAM for the XFCE session
disk_gb: 512         # thin-provisioned; grows on demand

accel3d: true        # set to false if the host GPU causes rendering glitches

usb:
  ehci: true         # USB 2.0 — USB-Blaster (original), Platform Cable USB
  xhci: true         # USB 3.0 — USB-Blaster II, modern Digilent boards

# Paths are relative to this vm.yml; build.py resolves them to absolute paths.
shared_folders:
  - host: "../.."
    guest: "/home/vagrant/workspace/workstation"
  - host: "projects"
    guest: "/home/vagrant/projects"
    create: true
  - host: "installers"
    guest: "/opt/fpga-installers"
    create: true
