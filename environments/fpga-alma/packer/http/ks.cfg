# Kickstart configuration for AlmaLinux 9 Vagrant base box.
# Installs a minimal RHEL 9 system that Packer can SSH into and provision.

text
lang en_US.UTF-8
keyboard us
timezone UTC --utc

rootpw --plaintext vagrant
user --name=vagrant --plaintext --password=vagrant --groups=wheel

selinux --permissive
firewall --disabled

bootloader --location=mbr
zerombr
clearpart --all --initlabel
autopart --type=plain

network --bootproto=dhcp --onboot=yes

services --enabled=sshd

reboot

%packages --ignoremissing --excludedocs
@^minimal-environment
open-vm-tools
curl
sudo
%end

%post
# Allow password auth so Packer can SSH in as vagrant before NOPASSWD sudo is set.
sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
%end
