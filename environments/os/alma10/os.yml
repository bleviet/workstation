description: "AlmaLinux 10 — GenericCloud, XFS, VirtualBox"

vbox_ostype: RedHat_64   # VBoxManage --ostype value

cloud_image:
  # Browse available builds: https://repo.almalinux.org/almalinux/10.2/cloud/x86_64/images/
  url: "https://repo.almalinux.org/almalinux/10.2/cloud/x86_64/images/AlmaLinux-10-GenericCloud-10.2-20260526.0.x86_64.qcow2"
  checksum_url: "https://repo.almalinux.org/almalinux/10.2/cloud/x86_64/images/CHECKSUM"
  format: qcow2           # converted to VDI by build.py via qemu-img

cloud_init_dir: cloud-init

scripts:
  setup:   scripts/setup.sh
  cleanup: scripts/cleanup.sh

grow_fs: xfs              # build.py selects grow command based on this value
firmware: efi             # Alma 10 requires UEFI
