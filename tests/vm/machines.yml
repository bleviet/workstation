# Multi-machine test environment for workstation provisioning.
# Replaces tests/vm/Vagrantfile.
#
# Usage (once build.py supports test VMs):
#   build.py create debian                # headless
#   build.py create debian-i3wm           # desktop profile — GUI window opens
#
# All machines use our own cloud images (environments/os/) — no Vagrant boxes.
# Ansible provisioning runs separately after VM is up; see provisioning/README.md.

machines:
  # ── Headless / CI ──────────────────────────────────────────────────────────
  - name:    workstation-test-debian
    os:      debian13
    profile: headless
    ram_mb:  2048
    cpus:    2
    gui:     false

  - name:    workstation-test-ubuntu24
    os:      ubuntu2404
    profile: headless
    ram_mb:  2048
    cpus:    2
    gui:     false

  - name:    workstation-test-ubuntu26
    os:      ubuntu2604
    profile: headless
    ram_mb:  2048
    cpus:    2
    gui:     false

  - name:    workstation-test-alma9
    os:      alma9
    profile: headless
    ram_mb:  2048
    cpus:    2
    gui:     false

  - name:    workstation-test-alma10
    os:      alma10
    profile: headless
    ram_mb:  2048
    cpus:    2
    gui:     false

  # ── Desktop — i3wm ────────────────────────────────────────────────────────
  - name:    workstation-test-debian-i3wm
    os:      debian13
    profile: desktop-i3wm
    ram_mb:  4096
    cpus:    2
    gui:     true

